    mop:    D?["#2C3038","#3C4248","#6080A0","#80A0C0"]:["#E8EEF2","#D0DDE8","#A8BDD0","#80A0BC"],
    baby:   D?["#3A2C38","#5A4458","#A878A8","#C8A0C8"]:["#F5E8F0","#EDD8EA","#DDB8D8","#CC98C8"],
  };
  const p = palettes[cat]||palettes.bed;

  const scenes = {
    bed:(
      <g>
        {[...Array(8)].map((_,i)=>[...Array(6)].map((__,j)=>(
          <rect key={`${i}${j}`} x={i*32+(j%2)*6} y={j*42} width="25" height="3" rx="1.5"
            fill={p[(i+j)%4]} opacity={0.45+((i*j+1)%3)*0.15}/>
        )))}
        <rect x="30" y="60" width="220" height="135" rx="8" fill={p[0]} opacity=".8"/>
        <rect x="35" y="65" width="210" height="125" rx="6" fill={p[1]} opacity=".5"/>
        {[...Array(7)].map((_,i)=>(
          <line key={i} x1="35" y1={76+i*16} x2="245" y2={76+i*16} stroke={p[2]} strokeWidth=".8" opacity=".3"/>
        ))}
      </g>
    ),
    mop:(
      <g>
        <rect x="60" y="40" width="160" height="20" rx="10" fill={p[2]} opacity=".9"/>
        <rect x="128" y="60" width="24" height="120" rx="8" fill={p[1]} opacity=".8"/>
        <rect x="50" y="175" width="180" height="55" rx="12" fill={p[0]} opacity=".85"/>
        <rect x="55" y="180" width="170" height="45" rx="9" fill={p[1]} opacity=".55"/>
        {[...Array(10)].map((_,i)=>(
          <rect key={i} x={58+i*17} y="185" width="10" height="35" rx="5" fill={p[2]} opacity=".3"/>
        ))}
        {[...Array(6)].map((_,i)=>(
          <line key={i} x1="55" y1={186+i*7} x2="225" y2={186+i*7} stroke={p[3]} strokeWidth=".6" opacity=".25"/>
        ))}
      </g>
    ),
    baby:(
      <g>
        <ellipse cx="140" cy="110" rx="80" ry="60" fill={p[0]} opacity=".85"/>
        <ellipse cx="90" cy="160" rx="38" ry="45" fill={p[0]} opacity=".8"/>
        <ellipse cx="190" cy="160" rx="38" ry="45" fill={p[0]} opacity=".8"/>
        <ellipse cx="140" cy="112" rx="72" ry="52" fill={p[1]} opacity=".5"/>
        {[...Array(4)].map((_,i)=>(
          <circle key={i} cx={108+i*21} cy="105" r="3" fill={p[2]} opacity=".45"/>
        ))}
        <ellipse cx="140" cy="90" rx="30" ry="8" fill={p[2]} opacity=".3"/>
      </g>
    ),
  };

  return(
    <svg viewBox="0 0 280 260" xmlns="http://www.w3.org/2000/svg"
      style={{width:"100%",height:"100%",display:"block"}}>
      <rect width="280" height="260" fill={p[0]}/>
      {[...Array(25)].map((_,i)=>(
        <line key={i} x1="0" y1={i*11} x2="280" y2={i*11+5} stroke={p[2]} strokeWidth=".4" opacity=".16"/>
      ))}
      {scenes[cat]||scenes.bed}
    </svg>
  );
}

/* ═══════════════════════════════════════════════
   CART DRAWER
═══════════════════════════════════════════════ */
function CartDrawer({open,onClose,cart,setCart,t,dark}){
  const D=dark;
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const bg=D?"#0F0D0B":"#FAF8F3",col=D?"#F0EBE0":"#1E1A16";
  const mut=D?"#7A7268":"#9A9088",bdr=D?"#2A2826":"#EBE4D8";
  const rowbg=D?"#1A1816":"#F5F0E8";
  const acBg=D?"#C8A87A":"#1E1A16",acTx=D?"#0F0D0B":"#FAF8F3";
  const upd=(cid,d)=>setCart(p=>p.map(i=>i.cartId===cid?{...i,qty:Math.max(0,i.qty+d)}:i).filter(i=>i.qty>0));
  return(
    <>
      <div className={`cart-bd ${open?"on":"off"}`} onClick={onClose}/>
      <div className={`cart-drawer ${open?"open":"closed"}`} style={{background:bg,color:col}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
          padding:"22px 28px",borderBottom:`1px solid ${bdr}`}}>
          <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
            <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"21px",
              letterSpacing:".05em"}}>{t.cartTitle}</span>
            {cart.length>0&&(
              <span style={{fontFamily:"'Jost',sans-serif",fontSize:"10px",
                background:acBg,color:acTx,padding:"2px 8px",borderRadius:"999px",
                fontWeight:500}}>{cart.reduce((s,i)=>s+i.qty,0)}</span>
            )}
          </div>
          <button onClick={onClose} className="icon-btn"
            style={{borderColor:bdr,color:col,background:"transparent"}}><I.X/></button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"20px 28px"}}>
          {cart.length===0?(
            <p style={{opacity:.4,fontSize:"13px",paddingTop:"20px",fontStyle:"italic"}}>{t.cartEmpty}</p>
          ):cart.map(item=>(
            <div key={item.cartId} style={{display:"flex",gap:"14px",
              paddingBottom:"20px",marginBottom:"20px",borderBottom:`1px solid ${bdr}`}}>
              <div style={{width:"80px",height:"80px",borderRadius:"12px",overflow:"hidden",
                flexShrink:0,background:D?"#2A2620":"#F0E8D8"}}>
                <img src={item.product.img} alt={item.name}
                  style={{width:"100%",height:"100%",objectFit:"cover"}}
                  onError={e=>{e.target.style.display="none"}}/>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <p style={{fontSize:"13px",fontWeight:500,marginBottom:"2px",
                  whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{item.name}</p>
                <p style={{fontSize:"10px",opacity:.45,marginBottom:"10px",fontFamily:"'Jost',sans-serif",
                  letterSpacing:".04em"}}>{item.size} · {item.color}</p>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div style={{display:"flex",alignItems:"center",gap:"8px",
                    background:rowbg,borderRadius:"999px",padding:"4px 10px"}}>
                    <button className="qty-btn" style={{color:col}} onClick={()=>upd(item.cartId,-1)}><I.Minus/></button>
                    <span style={{fontSize:"13px",fontWeight:500,minWidth:"14px",textAlign:"center"}}>{item.qty}</span>
                    <button className="qty-btn" style={{color:col}} onClick={()=>upd(item.cartId,+1)}><I.Plus/></button>
                  </div>
                  <span style={{fontSize:"14px",fontWeight:600}}>{t.cur}{(item.price*item.qty).toFixed(2)}</span>
                </div>
              </div>
            </div>
          ))}
        </div>
        {cart.length>0&&(
          <div style={{padding:"20px 28px",borderTop:`1px solid ${bdr}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"18px"}}>
              <span style={{opacity:.55,fontSize:"13px"}}>{t.cartTotal}</span>
              <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"26px",fontWeight:500}}>
                {t.cur}{total.toFixed(2)}</span>
            </div>
            <button style={{width:"100%",padding:"15px",borderRadius:"999px",border:"none",
              background:acBg,color:acTx,fontFamily:"'Jost',sans-serif",fontSize:"11px",
              fontWeight:500,letterSpacing:".22em",textTransform:"uppercase",cursor:"pointer"}}
              onMouseOver={e=>e.currentTarget.style.opacity=.85}
              onMouseOut={e=>e.currentTarget.style.opacity=1}>
              {t.cartCheckout}
            </button>
            <p style={{textAlign:"center",fontSize:"10px",marginTop:"10px",opacity:.3,
              fontFamily:"'Jost',sans-serif",letterSpacing:".06em"}}>
              Secure · Free Returns · SSL Encrypted
            </p>
          </div>
        )}
      </div>
    </>
  );
}

/* ═══════════════════════════════════════════════
   PRODUCT CARD
═══════════════════════════════════════════════ */
function ProductCard({product,t,lang,dark,onAdd}){
  const [added,setAdded]=useState(false);
  const [color,setColor]=useState(0);
  const [size,setSize]=useState(0);
  const [wished,setWished]=useState(false);
  const [imgErr,setImgErr]=useState(false);
  const D=dark;
  const name=lang==="EN"?product.nameEN:product.nameFI;
  const desc=lang==="EN"?product.descEN:product.descFI;
  const tag=lang==="EN"?product.tagEN:product.tagFI;

  const bLabel=product.badge==="best"?t.badge_best||"Bestseller"
    :product.badge==="new"?(lang==="EN"?"New":"Uusi")
    :product.badge==="bundle"?(lang==="EN"?"Bundle":"Setti")
    :product.badge==="sale"?(lang==="EN"?"Sale":"Ale"):null;

  const bg=D?"#1A1714":"#FFFFFF",col=D?"#F0EBE0":"#1E1A16";
  const mut=D?"#7A7268":"#9A9088",bdr=D?"#2A2826":"#EBE4D8";
  const rowbg=D?"#242220":"#F5F0E8";
  const gold="#C8A87A",deep="#1E1A16";
  const acBg=D?gold:deep,acTx=D?deep:"#FAF8F3";

  const catColor={
    bed:   {bg:D?"rgba(200,168,122,.12)":"rgba(200,168,122,.12)",col:D?"#C8A87A":"#8A6A3A"},
    mop:   {bg:D?"rgba(100,160,200,.12)":"rgba(80,140,190,.1)",col:D?"#78B4D8":"#3A6A8A"},
    baby:  {bg:D?"rgba(200,140,200,.12)":"rgba(180,100,180,.1)",col:D?"#D898D8":"#8A3A8A"},
  };
  const cc=catColor[product.cat]||catColor.bed;

  const handleAdd=()=>{
    onAdd({cartId:`${product.id}-${Date.now()}`,id:product.id,product,name,
      price:product.price,color:product.colorNames[color],size:product.sizes[size],qty:1});
    setAdded(true);setTimeout(()=>setAdded(false),2200);
  };

  return(
    <div className="pcard" style={{background:bg,borderRadius:"20px",overflow:"hidden",
      display:"flex",flexDirection:"column",position:"relative",
      boxShadow:D?"0 2px 24px rgba(0,0,0,.38)":"0 2px 20px rgba(0,0,0,.07)"}}>

      {/* Category pill */}
      <div style={{position:"absolute",top:"12px",left:"12px",zIndex:11,
        display:"flex",gap:"6px",alignItems:"center",flexWrap:"wrap"}}>
        <span style={{padding:"3px 9px",borderRadius:"999px",fontSize:"9px",fontWeight:500,
          letterSpacing:".12em",textTransform:"uppercase",fontFamily:"'Jost',sans-serif",
          background:cc.bg,color:cc.col,backdropFilter:"blur(6px)"}}>{tag}</span>
        {bLabel&&(
          <span style={{padding:"3px 9px",borderRadius:"999px",fontSize:"9px",fontWeight:500,
            letterSpacing:".12em",textTransform:"uppercase",fontFamily:"'Jost',sans-serif",
            background:product.badge==="sale"?"rgba(200,90,58,.85)":
              product.badge==="new"?"rgba(74,130,106,.85)":
              D?"rgba(200,168,122,.9)":"rgba(30,26,22,.88)",
            color:product.badge==="sale"||product.badge==="new"?"white":acTx,
            backdropFilter:"blur(6px)"}}>
            {bLabel}
          </span>
        )}
      </div>

      {/* Wishlist */}
      <button className="wish-btn" onClick={()=>setWished(w=>!w)}
        style={{background:D?"rgba(20,18,16,.72)":"rgba(255,255,255,.78)",
          color:wished?"#D4534A":col}}>
        <I.Heart s={15} f={wished}/>
      </button>

      {/* Image */}
      <div className="img-zoom" style={{aspectRatio:"4/3",background:D?"#2A2620":"#F0EBE0",flexShrink:0}}>
        {!imgErr?(
          <img src={product.img} alt={name} onError={()=>setImgErr(true)}
            style={{width:"100%",height:"100%",objectFit:"cover",display:"block",
              transition:"transform .8s cubic-bezier(.22,1,.36,1)"}}/>
        ):(
          <FallbackImg product={product} dark={dark}/>
        )}
      </div>

      {/* Body */}
      <div style={{padding:"16px 18px 18px",display:"flex",flexDirection:"column",flex:1}}>
        {/* Rating */}
        <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"7px"}}>
          <Stars n={product.rating}/>
          <span style={{fontSize:"10px",color:mut,fontFamily:"'Jost',sans-serif",
            letterSpacing:".03em"}}>{product.rating} ({product.reviews.toLocaleString()})</span>
        </div>

        <h3 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"17px",lineHeight:1.2,
          marginBottom:"4px",color:col,fontWeight:500}}>{name}</h3>
        <p style={{fontSize:"11px",lineHeight:1.65,color:mut,marginBottom:"11px"}}>{desc}</p>

        {/* Colours */}
        <div style={{display:"flex",alignItems:"center",gap:"5px",marginBottom:"9px",flexWrap:"wrap"}}>
          <span style={{fontSize:"9px",color:mut,marginRight:"2px",letterSpacing:".1em",
            textTransform:"uppercase",fontFamily:"'Jost',sans-serif"}}>{t.colorLabel}:</span>
          {product.colors.map((c,i)=>(
            <div key={i} className={`swatch ${color===i?"active":""}`}
              onClick={()=>setColor(i)} title={product.colorNames[i]}
              style={{backgroundColor:c,borderColor:color===i?gold:"transparent"}}/>
          ))}
          <span style={{fontSize:"9px",color:mut,marginLeft:"2px",fontFamily:"'Jost',sans-serif"}}>
            {product.colorNames[color]}
          </span>
        </div>

        {/* Sizes */}
        <div style={{display:"flex",flexWrap:"wrap",gap:"4px",marginBottom:"13px"}}>
          {product.sizes.map((s,i)=>(
            <button key={i} className="size-btn" onClick={()=>setSize(i)}
              style={{background:size===i?acBg:"transparent",
                borderColor:size===i?acBg:(D?"#3A3530":"#DDD8CE"),
                color:size===i?acTx:(D?"#7A7268":"#9A9088")}}>
              {s}
            </button>
          ))}
        </div>

        {/* Price + Add */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:"auto",gap:"8px"}}>
          <div style={{flexShrink:0}}>
            <div style={{display:"flex",alignItems:"baseline",gap:"6px"}}>
              <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"22px",
                fontWeight:600,color:col}}>{t.cur}{product.price}</span>
              {product.origPrice&&(
                <span style={{fontSize:"11px",textDecoration:"line-through",
                  color:D?"#4A4440":"#C0B8A8"}}>{t.cur}{product.origPrice}</span>
              )}
            </div>
            <p style={{fontSize:"9px",color:D?"#6A9A6A":"#5A8A5A",fontFamily:"'Jost',sans-serif",
              letterSpacing:".05em"}}>● {t.inStock}</p>
          </div>
          <button className="add-btn" onClick={handleAdd}
            style={{background:added?(D?"rgba(74,106,74,.9)":"rgba(232,245,232,.9)"):acBg,
              color:added?(D?"#A8D8A8":"#3A7A3A"):acTx,flexShrink:0}}>
            {added?<><I.Check s={11}/>{t.added}</>:t.addToCart}
          </button>
        </div>
      </div>
    </div>
  );
}

                  "{r.text}"
                </p>
                <div style={{display:"flex",alignItems:"center",gap:"12px",
                  borderTop:`1px solid ${bdr}`,paddingTop:"16px"}}>
                  <img src={r.img} alt={r.name}
                    style={{width:"40px",height:"40px",borderRadius:"50%",objectFit:"cover",flexShrink:0}}
                    onError={e=>{e.target.style.background="#C8A87A";e.target.style.display="none"}}/>
                  <div>
                    <p style={{fontSize:"13px",fontWeight:500,marginBottom:"1px"}}>{r.name}</p>
                    <p style={{fontSize:"11px",color:mut,fontFamily:"'Jost',sans-serif"}}>{r.loc}</p>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* ── NEWSLETTER ── */}
      <section style={{padding:"84px 32px",background:D?"#141210":deep,
        position:"relative",overflow:"hidden"}}>
        {[360,220].map((r,i)=>(
          <div key={i} style={{position:"absolute",right:`${-r/2+i*60}px`,top:`${-r/2}px`,
            width:`${r}px`,height:`${r}px`,borderRadius:"50%",
            border:`1px solid ${D?"rgba(200,168,122,.06)":"rgba(250,248,243,.05)"}`,
            pointerEvents:"none"}}/>
        ))}
        <div style={{maxWidth:"520px",margin:"0 auto",textAlign:"center",position:"relative",zIndex:1}}>
          <p style={{fontFamily:"'Jost',sans-serif",fontSize:"10px",letterSpacing:".3em",
            textTransform:"uppercase",
            color:D?"rgba(200,168,122,.55)":"rgba(250,248,243,.38)",marginBottom:"13px"}}>
            {t.newsletter_label}
          </p>
          <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"42px",fontWeight:300,
            color:D?gold:"#FAF8F3",marginBottom:"13px"}}>{t.newsletter_title}</h2>
          <p style={{fontSize:"14px",lineHeight:1.75,
            color:D?"rgba(200,168,122,.45)":"rgba(250,248,243,.42)",
            marginBottom:"32px"}}>{t.newsletter_sub}</p>
          <div style={{display:"flex",gap:"10px",flexWrap:"wrap",justifyContent:"center"}}>
            <input type="email" placeholder={t.newsletter_ph}
              style={{flex:1,minWidth:"200px",padding:"13px 22px",borderRadius:"999px",
                border:`1px solid ${D?"rgba(200,168,122,.18)":"rgba(250,248,243,.14)"}`,
                background:D?"rgba(255,255,255,.05)":"rgba(255,255,255,.07)",
                color:D?"#F0EBE0":"#FAF8F3",fontSize:"13px"}}/>
            <button style={{padding:"13px 26px",borderRadius:"999px",border:"none",
              background:gold,color:deep,fontFamily:"'Jost',sans-serif",fontSize:"10px",
              fontWeight:500,letterSpacing:".22em",textTransform:"uppercase",
              cursor:"pointer",whiteSpace:"nowrap"}}
              onMouseOver={e=>e.currentTarget.style.opacity=.85}
              onMouseOut={e=>e.currentTarget.style.opacity=1}>
              {t.newsletter_btn}
            </button>
          </div>
        </div>
      </section>

      {/* ── FOOTER ── */}
      <footer style={{borderTop:`1px solid ${bdr}`,padding:"60px 32px 0"}}>
        <div style={{maxWidth:"1340px",margin:"0 auto"}}>
          <div className="footer-grid"
            style={{display:"grid",gridTemplateColumns:"2.2fr 1fr 1fr 1fr",
              gap:"44px",marginBottom:"48px"}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"14px"}}>
                <div style={{width:"32px",height:"32px",borderRadius:"50%",background:acBg,
                  display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <span style={{fontFamily:"'Cormorant Garamond',serif",fontWeight:700,
                    fontSize:"14px",color:acTx}}>S</span>
                </div>
                <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"20px",
                  letterSpacing:".18em",fontWeight:400}}>SOLDA</span>
              </div>
              <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"23px",
                fontStyle:"italic",fontWeight:300,color:mut,marginBottom:"13px"}}>
                {t.footerTag}
              </p>
              <p style={{fontSize:"12px",lineHeight:1.8,color:mut,maxWidth:"210px"}}>
                {lang==="EN"
                  ?"Reusable home & baby essentials for the Nordic household."
                  :"Uudelleenkäytettävät koti- ja vauvatuotteet pohjoismaiseen kotiin."}
              </p>
              <div style={{display:"flex",gap:"16px",marginTop:"18px"}}>
                {["Instagram","Pinterest","TikTok"].map(s=>(
                  <a key={s} href="#" style={{fontSize:"10px",letterSpacing:".1em",
                    color:mut,textDecoration:"none",opacity:.5,transition:"opacity .2s",
                    fontFamily:"'Jost',sans-serif",textTransform:"uppercase"}}
                    onMouseOver={e=>e.currentTarget.style.opacity=1}
                    onMouseOut={e=>e.currentTarget.style.opacity=.5}>{s}</a>
                ))}
              </div>
            </div>
            {[[t.f1,t.fl1],[t.f2,t.fl2],[t.f3,t.fl3]].map(([title,links])=>(
              <div key={title}>
                <h4 style={{fontFamily:"'Jost',sans-serif",fontSize:"10px",letterSpacing:".2em",
                  textTransform:"uppercase",fontWeight:500,color:mut,marginBottom:"16px"}}>
                  {title}
                </h4>
                <ul style={{listStyle:"none",display:"flex",flexDirection:"column",gap:"10px"}}>
                  {links.map(l=>(
                    <li key={l}>
                      <a href="#" style={{fontSize:"12px",color:col,textDecoration:"none",
                        opacity:.5,transition:"opacity .2s"}}
                        onMouseOver={e=>e.currentTarget.style.opacity=1}
                        onMouseOut={e=>e.currentTarget.style.opacity=.5}>{l}</a>
                    </li>
                  ))}
                </ul>
              </div>
            ))}
          </div>

          {/* Bottom strip */}
          <div style={{borderTop:`1px solid ${bdr}`,padding:"20px 0",
            display:"flex",flexWrap:"wrap",alignItems:"center",
            justifyContent:"space-between",gap:"12px"}}>
            <p style={{fontSize:"11px",color:mut,fontFamily:"'Jost',sans-serif"}}>
              {t.footerCopy}
            </p>
            <div style={{display:"flex",gap:"20px",flexWrap:"wrap"}}>
              {["Privacy Policy","Terms","Cookies"].map(l=>(
                <a key={l} href="#" style={{fontSize:"11px",color:mut,textDecoration:"none",
                  opacity:.5,transition:"opacity .2s",fontFamily:"'Jost',sans-serif"}}
                  onMouseOver={e=>e.currentTarget.style.opacity=1}
                  onMouseOut={e=>e.currentTarget.style.opacity=.5}>{l}</a>
              ))}
            </div>
          </div>

          {/* VTEK Credit */}
          <div style={{borderTop:`1px solid ${D?"rgba(255,255,255,.03)":"rgba(0,0,0,.04)"}`,
            padding:"15px 0 24px",display:"flex",alignItems:"center",
            justifyContent:"center",gap:"6px"}}>
            <span style={{fontSize:"11px",color:mut,opacity:.5,
              fontFamily:"'Jost',sans-serif",letterSpacing:".04em"}}>
              {t.footerCredit}
            </span>
            <a href="https://vtekbizcorp.online/#contact"
              target="_blank" rel="noopener noreferrer"
              style={{fontSize:"11px",fontFamily:"'Jost',sans-serif",letterSpacing:".04em",
                fontWeight:500,textDecoration:"none",
                color:D?gold:"#8A6A4A",
                borderBottom:`1px solid ${D?"rgba(200,168,122,.25)":"rgba(138,106,74,.25)"}`,
                paddingBottom:"1px",transition:"all .2s"}}
              onMouseOver={e=>{e.currentTarget.style.opacity=".78";e.currentTarget.style.borderBottomColor=D?gold:"#8A6A4A"}}
              onMouseOut={e=>{e.currentTarget.style.opacity="1";e.currentTarget.style.borderBottomColor=D?"rgba(200,168,122,.25)":"rgba(138,106,74,.25)"}}>
              VTEK Bizcorp &amp; Media Labs
            </a>
          </div>
        </div>
      </footer>

      <CartDrawer open={cartOpen} onClose={()=>setCartOpen(false)}
        cart={cart} setCart={setCart} t={t} dark={dark}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
